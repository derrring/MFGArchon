[pytest]
minversion = 6.0
testpaths = tests

# Safety net (Issue #1522): a genuine infinite-loop test is killed + reported instead of hanging the
# suite forever. Generous ceiling — legit slow tests are minutes, well under this. Note: a bare
# `pytest tests/` is serial + includes @slow (hours); match CI locally with `-n auto -m "not slow ..."`.
timeout = 900
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# xfail_strict (Issue #1663): an xfail that starts PASSING is a failure, not a pass.
# Without this, a fixed defect never announces itself -- two XPASSes had accumulated
# silently, both citing an issue (#583) that was closed months earlier, and neither
# was actually exercising the path its reason named.
xfail_strict = true

addopts =
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --durations=10

markers =
    unit: Unit tests (fast, isolated components)
    integration: Integration tests (cross-component interactions)
    performance: Performance tests (may be slow, measures timing/memory)
    mathematical: Mathematical property validation (mass conservation, etc.)
    fast: Fast tests (complete quickly, for rapid iteration)
    slow: Slow tests (may take >30 seconds to complete, skipped on PRs)
    manual: Runs in NO automatic tier. Invoke explicitly with `pytest -m manual`. Nothing will report when a manual test breaks -- that is the cost, pay it only when a test's cost makes every automatic tier worse off.
    experimental: Tests for experimental features (may be unstable)
    optional_torch: Tests requiring PyTorch (RL algorithms, neural operators, GPU tests)
    benchmark: Performance measurement tests (not validation, results-only)
    environment: Environment-specific tests (maze generation, problem environments)

filterwarnings =
    ignore::DeprecationWarning:mfgarchon.*
    ignore::PendingDeprecationWarning
    ignore::UserWarning:matplotlib.*
    ignore::RuntimeWarning:numpy.*
    ignore:Newton tolerance.*:UserWarning:mfgarchon.*
    ignore:Parameter.*is deprecated:DeprecationWarning

norecursedirs = archive build dist docs .git .tox .eggs *.egg benchmarks scripts

log_cli = false
log_cli_level = INFO
