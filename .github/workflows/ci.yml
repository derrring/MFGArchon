name: CI/CD Pipeline
#
# Consolidated workflow combining quality, security, and performance checks
# Smart triggering: lightweight on PRs, comprehensive on releases
# Optimized for cost efficiency with manual fallback options
#

on:
  # Lightweight checks on PRs
  pull_request:
    paths:
      - 'mfgarchon/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'

  # Full checks on main branch pushes
  push:
    branches: [main]
    paths:
      - 'mfgarchon/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'

  # Comprehensive checks on releases
  release:
    types: [published]

  # Manual trigger for full validation
  workflow_dispatch:
    inputs:
      run_security_scan:
        description: 'Run comprehensive security scanning'
        required: false
        default: 'false'
        type: boolean
      run_performance_tests:
        description: 'Run performance regression tests'
        required: false
        default: 'true'
        type: boolean

env:
  PYTHON_VERSION: '3.12'
  CACHE_VERSION: v1

jobs:
  # === PHASE 0: Quick Validation (Fail Fast) ===
  quick-checks:
    name: Quick Validation (Syntax & Format)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install minimal dependencies
      timeout-minutes: 2
      run: |
        python -m pip install --upgrade pip
        pip install ruff

    - name: Python syntax check (instant fail)
      timeout-minutes: 1
      run: |
        echo "Checking Python syntax..."
        find mfgarchon -name "*.py" -exec python -m py_compile {} +
        echo "✅ Syntax valid"

    - name: Ruff format check (instant fail)
      timeout-minutes: 1
      run: |
        echo "Checking code formatting..."
        ruff format --check mfgarchon/
        echo "✅ Formatting valid"

    - name: Ruff lint (critical errors only)
      timeout-minutes: 1
      run: |
        echo "Checking for critical lint errors (syntax & undefined names)..."
        ruff check --select F mfgarchon/
        echo "✅ No critical errors"

    - name: Fail-fast ratchet (no new silent fallbacks)
      timeout-minutes: 1
      run: |
        echo "Checking for NEW fail-fast violations (broad/bare except, silent pass, hasattr) vs baseline..."
        python scripts/check_fail_fast.py --path mfgarchon --check-baseline scripts/fail_fast_baseline.json

  # === PHASE 1: Import Validation ===
  # Note: Ruff formatting, linting, and MyPy checks run in modern_quality.yml workflow
  import-validation:
    name: Import Validation
    runs-on: ubuntu-latest
    needs: quick-checks
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      timeout-minutes: 5
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Quick import test
      timeout-minutes: 1
      run: |
        echo "Testing package imports..."
        python -c "import mfgarchon; print('✅ Package imports successfully')"

    - name: MyPy type gate (config subpackage, blocking)
      timeout-minutes: 2
      run: |
        echo "Type-checking mfgarchon/config (blocking gate)..."
        # Scoped to config + --follow-imports=silent on purpose: raw mypy on
        # config pulls 1800+ transitive errors from un-annotated deps otherwise.
        mypy mfgarchon/config --follow-imports=silent
        echo "✅ config type-checks clean"

  test-suite:
    # NOT the test suite. On PRs this runs a smoke subset only; the authoritative
    # full run is scripts/local_ci.sh (see CLAUDE.md, "CI shape"). Naming it
    # "Test Suite" made a green check read as "your tests passed", which is false.
    name: Smoke subset (NOT the full suite)
    runs-on: ubuntu-latest
    needs: import-validation
    timeout-minutes: 45  # release path runs the full suite; the PR path is a smoke subset

    strategy:
      fail-fast: true  # Stop on first failure

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      timeout-minutes: 5
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Quick import test
      timeout-minutes: 1
      run: |
        echo "Testing package imports..."
        python -c "import mfgarchon; print('✅ Package imports successfully')"

    # PR path: a SMOKE subset, not the full suite. The full run is the local gate
    # (scripts/local_ci.sh, ~2.5 min) plus nightly.yml. Measured 2026-07-19: the
    # full suite is ~141 s locally and exceeded the 25-min step budget here --
    # coverage accounts for 1.5x, the runner itself for the rest. Online execution
    # of the full suite was buying latency, not signal.
    - name: Smoke tests (fast subset; the full suite is the local gate + nightly)
      if: github.event_name != 'release'
      timeout-minutes: 12
      env:
        OMP_NUM_THREADS: 1
        OPENBLAS_NUM_THREADS: 1
        MKL_NUM_THREADS: 1
      run: |
        pytest tests/unit/test_core tests/unit/test_config -v \
          -n auto \
          -m "not slow and not optional_torch and not benchmark and not experimental and not environment" \
          --junitxml=junit.xml -o junit_family=legacy --maxfail=10 \
          --durations=10

    - name: Run all tests with coverage (including slow tests on releases)
      if: github.event_name == 'release'
      timeout-minutes: 35
      run: |
        pytest tests/ -v --cov=mfgarchon --cov-report=xml --cov-report=term --junitxml=junit.xml -o junit_family=legacy --maxfail=50 --durations=20

    - name: Upload coverage reports to Codecov
      # coverage.xml is produced only by the release step; on PRs this found 0 files and passed
      if: ${{ !cancelled() && github.event_name == 'release' }}
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: false
        verbose: true

    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/test-results-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./junit.xml
        fail_ci_if_error: false

  # === PHASE 3: Performance & Memory Validation ===
  performance-check:
    name: Performance & Memory Validation
    runs-on: ubuntu-latest
    needs: test-suite  # Wait for tests to pass before performance checks
    timeout-minutes: 15  # Timeout for performance checks
    if: ${{ github.event.inputs.run_performance_tests != 'false' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      timeout-minutes: 5
      run: |
        python -m pip install --upgrade pip
        pip install -e .[performance]

    - name: Memory usage validation
      timeout-minutes: 10
      run: |
        echo "🧠 Testing memory usage with controlled problem size..."
        python -c "
        import numpy as np
        from mfgarchon import MFGProblem
        from mfgarchon.core.mfg_components import MFGComponents
        from mfgarchon.geometry import TensorProductGrid
        from mfgarchon.geometry.boundary import no_flux_bc
        from mfgarchon.config import MFGSolverConfig
        from mfgarchon.alg.numerical.coupling import FixedPointIterator
        from mfgarchon.alg.numerical.fp_solvers import FPParticleSolver
        from mfgarchon.alg.numerical.hjb_solvers import HJBGFDMSolver
        from mfgarchon.core.hamiltonian import SeparableHamiltonian, QuadraticControlCost
        import psutil
        import os

        # Default Hamiltonian for tests (Issue #673)
        H = SeparableHamiltonian(
            control_cost=QuadraticControlCost(control_cost=1.0),
            coupling=lambda m: m,
            coupling_dm=lambda m: 1.0,
        )

        # Resource monitoring
        process = psutil.Process(os.getpid())
        initial_memory = process.memory_info().rss / 1024 / 1024  # MB

        # Create problem with modern API (TensorProductGrid + explicit components)
        domain = TensorProductGrid(bounds=[(0.0, 1.0)], Nx_points=[26], boundary_conditions=no_flux_bc(dimension=1))
        components = MFGComponents(hamiltonian=H, m_initial=lambda x: np.exp(-10*(x-0.5)**2), u_terminal=lambda x: 0.0)
        problem = MFGProblem(geometry=domain, T=1.0, Nt=15, diffusion=0.5, components=components)

        # Create config
        config = MFGSolverConfig()

        final_memory = process.memory_info().rss / 1024 / 1024  # MB
        memory_used = final_memory - initial_memory

        print('✅ MFGProblem created successfully')
        print('✅ MFGSolverConfig created successfully')
        print('✅ All solver components importable')
        print(f'🧠 Memory used: {memory_used:.1f} MB')
        print(f'📊 Initial memory: {initial_memory:.1f} MB')
        print(f'📊 Final memory: {final_memory:.1f} MB')

        if memory_used > 800:  # 800 MB threshold
            print(f'❌ Excessive memory usage: {memory_used:.1f} MB')
            exit(1)
        else:
            print(f'✅ Memory usage efficient: {memory_used:.1f} MB')
        "

    - name: Parameter migration system check
      run: |
        echo "🔍 Validating parameter migration system..."
        python -c "
        from mfgarchon.utils.parameter_migration import global_parameter_migrator
        assert len(global_parameter_migrator.mappings) > 0, 'parameter migration registry is empty'; print(f'✅ Parameter migration system loaded with {len(global_parameter_migrator.mappings)} mappings')
        print('📋 Migration system operational for runtime parameter conversion')
        "

  # === PHASE 3: Security Scanning (Conditional) ===
  security-scan:
    name: Security Analysis
    runs-on: ubuntu-latest
    needs: import-validation
    timeout-minutes: 10  # Timeout for security scans
    if: ${{ github.event_name == 'release' || github.event.inputs.run_security_scan == 'true' || github.event_name == 'workflow_dispatch' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pip-audit
        pip install -e .[dev]

    - name: Bandit security scan
      run: |
        echo "🔒 Running Bandit security analysis..."
        bandit -r mfgarchon/ -f json -o bandit-report.json || true
        bandit -r mfgarchon/ --severity-level medium --confidence-level medium
      continue-on-error: true

    - name: Dependency vulnerability check
      run: |
        echo "🔒 Checking dependencies for vulnerabilities..."
        safety check --json --output safety-report.json || true
        safety check --short-report
      continue-on-error: true

    - name: Comprehensive dependency audit
      run: |
        echo "🔒 Running comprehensive dependency audit..."
        pip-audit --format=json --output=pip-audit-report.json || true
        pip-audit --desc
      continue-on-error: true

    - name: Upload security reports
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json
          pip-audit-report.json
        retention-days: 30

  # === PHASE 4: Integration Tests (Release Only) ===
  integration-tests:
    name: Integration Testing
    runs-on: ubuntu-latest
    needs: [import-validation]
    timeout-minutes: 30  # Timeout for integration tests (includes slow tests)
    if: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}

    strategy:
      matrix:
        python-version: ['3.12']  # Package requires Python >=3.12

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[test,performance]

    - name: Run integration tests
      run: |
        echo "🧪 Running integration tests for Python ${{ matrix.python-version }}..."
        python -c "
        import numpy as np
        from mfgarchon import MFGProblem
        from mfgarchon.core.mfg_components import MFGComponents
        from mfgarchon.geometry import TensorProductGrid
        from mfgarchon.geometry.boundary import no_flux_bc
        from mfgarchon.core.hamiltonian import SeparableHamiltonian, QuadraticControlCost
        import time

        # Default Hamiltonian for tests (Issue #673)
        H = SeparableHamiltonian(
            control_cost=QuadraticControlCost(control_cost=1.0),
            coupling=lambda m: m,
            coupling_dm=lambda m: 1.0,
        )

        # Create problem with modern API (TensorProductGrid + explicit components)
        domain = TensorProductGrid(bounds=[(0.0, 1.0)], Nx_points=[21], boundary_conditions=no_flux_bc(dimension=1))
        components = MFGComponents(hamiltonian=H, m_initial=lambda x: np.exp(-10*(x-0.5)**2), u_terminal=lambda x: 0.0)
        problem = MFGProblem(geometry=domain, T=1.0, Nt=10, diffusion=0.5, components=components)

        # Test problem.solve() API
        print('Testing problem.solve() API...')
        start_time = time.time()
        result = problem.solve()
        duration = time.time() - start_time
        print(f'  ✅ problem.solve(): {duration:.2f}s')

        print('🎉 All integration tests passed!')
        "

  # === PHASE 5: Build Validation (Release Only) ===
  build-validation:
    name: Build & Distribution
    runs-on: ubuntu-latest
    needs: [import-validation]
    timeout-minutes: 15  # Timeout for build validation
    if: ${{ github.event_name == 'release' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build distribution
      run: |
        echo "📦 Building distribution packages..."
        python -m build

    - name: Validate distribution
      run: |
        echo "🔍 Validating distribution packages..."
        twine check dist/*

    - name: Test installation from built package
      run: |
        echo "🧪 Testing installation from built package..."
        pip install dist/*.whl
        python -c "
        import numpy as np
        import mfgarchon
        print(f'✅ Successfully imported mfgarchon version {mfgarchon.__version__}')

        # Quick smoke test with modern API (TensorProductGrid + explicit components)
        from mfgarchon import MFGProblem
        from mfgarchon.core.mfg_components import MFGComponents
        from mfgarchon.geometry import TensorProductGrid
        from mfgarchon.geometry.boundary import no_flux_bc
        from mfgarchon.core.hamiltonian import SeparableHamiltonian, QuadraticControlCost
        H = SeparableHamiltonian(
            control_cost=QuadraticControlCost(control_cost=1.0),
            coupling=lambda m: m,
            coupling_dm=lambda m: 1.0,
        )
        domain = TensorProductGrid(bounds=[(0.0, 1.0)], Nx_points=[11], boundary_conditions=no_flux_bc(dimension=1))
        components = MFGComponents(hamiltonian=H, m_initial=lambda x: np.exp(-10*(x-0.5)**2), u_terminal=lambda x: 0.0)
        problem = MFGProblem(geometry=domain, T=1.0, Nt=5, diffusion=0.5, components=components)
        result = problem.solve()
        print('✅ Package installation and basic functionality verified')
        "

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: distribution-packages
        path: dist/
        retention-days: 30

  # === PHASE 6: Summary Report ===
