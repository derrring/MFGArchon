# Modern pre-commit configuration for MFGArchon using Ruff
# Unified linting and formatting with 10-100x faster performance
# Uses pyproject.toml settings for all configuration
#
# Alternative configurations available:
# - .pre-commit-config-legacy.yaml (Black + isort + Pylint)
# - .pre-commit-config-uv.yaml (UV-powered Ruff)

repos:
  # Unified formatting and linting with Ruff (replaces Black + isort + Pylint)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      # Format code (replaces Black + isort)
      - id: ruff-format
        # Configuration read from pyproject.toml [tool.ruff.format] and [tool.ruff.lint.isort]
        exclude: ^investigations/

      # Lint code (replaces Pylint + flake8)
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        # Configuration read from pyproject.toml [tool.ruff.lint]
        exclude: ^investigations/

  # Essential safety checks (low friction, prevent bugs)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-added-large-files
        args: [--maxkb=1000]
        exclude: ^uv\.lock$

  # Documentation structure validation (warning-only until consolidation complete)
  - repo: local
    hooks:
      - id: check-docs-structure
        name: Check documentation structure
        entry: bash -c 'python scripts/check_docs_structure.py || echo "⚠️  Documentation check failed (non-blocking during consolidation)"'
        language: system
        pass_filenames: false
        files: ^docs/.*\.md$
        stages: [pre-commit]

  # Strategic typing: Core infrastructure perfection maintained (366 → 0 errors achieved)
  # MyPy disabled in pre-commit due to auxiliary module import dependencies
  # Core typing validation maintained through direct `mypy mfgarchon --ignore-missing-imports`
  # This preserves the strategic typing holy grail achievement while allowing research flexibility

  # THE TEST GATE (2026-07-19). The full suite no longer runs on GitHub for PRs --
  # it exceeded a 25-minute step budget while taking ~141 s locally -- so this hook
  # is where it actually runs. Pre-PUSH, not pre-commit: it is ~2.5 min, which is
  # right before a push and wrong before every commit.
  - repo: local
    hooks:
      - id: local-ci-gate
        name: Full test gate (scripts/local_ci.sh)
        entry: scripts/local_ci.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

# Performance optimizations
default_language_version:
  python: python3.12

default_stages: [pre-commit]
# pre-push must be installed explicitly; `pre-commit install` alone does NOT wire it:
#   pre-commit install --hook-type pre-commit --hook-type pre-push
default_install_hook_types: [pre-commit, pre-push]
minimum_pre_commit_version: "3.2.0"
